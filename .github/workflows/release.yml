name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MSYS2 (gcc for CGO)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: mingw-w64-x86_64-gcc

      - name: Add MSYS2 to PATH
        shell: pwsh
        run: echo "D:\a\_temp\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install WebView2
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Start-Process -FilePath "$env:TEMP\MicrosoftEdgeWebview2Setup.exe" -Args "/silent /install" -Wait

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build desktop app
        shell: pwsh
        env:
          CGO_ENABLED: '1'
        run: wails build -o schemata.exe -skipbindings

      - name: Build MCP server
        run: go build -o build/bin/schemata-mcp.exe ./cmd/mcp-server/

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $env:PATH = "C:\Program Files (x86)\NSIS;$env:PATH"
          makensis installer.nsi

      - name: Create zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release
          Copy-Item build\bin\schemata.exe release\
          Copy-Item build\bin\schemata-mcp.exe release\
          Compress-Archive -Path release\* -DestinationPath schemata-windows-amd64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            schemata-windows-amd64.zip
            build/bin/schemata-setup.exe
          generate_release_notes: true
